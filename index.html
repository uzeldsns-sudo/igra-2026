<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Платформер: Настоящий Человечек</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        canvas {
            background: #16213e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 10px;
            max-width: 100%;
            max-height: 60vh;
        }
        .info {
            margin-bottom: 10px;
            font-size: 18px;
            text-shadow: 1px 1px 2px black;
            text-align: center;
        }
        /* Стили для мобильных кнопок */
        .controls {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 800px;
            margin-top: 15px;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .move-buttons {
            display: flex;
            gap: 15px;
        }
        .btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #00adb5;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            touch-action: none;
        }
        .btn:active {
            background: #00adb5;
            transform: scale(0.9);
        }
        /* Прячем кнопки на компьютерах */
        @media (pointer: fine) {
            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="info">Счёт: <span id="score">0</span></div>
<canvas id="gameCanvas" width="800" height="400"></canvas>

<!-- Мобильное управление -->
<div class="controls">
    <div class="move-buttons">
        <div class="btn" id="btnLeft">←</div>
        <div class="btn" id="btnRight">→</div>
    </div>
    <div class="btn" id="btnJump">↑</div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

let score = 0;
let animationFrame = 0;

const player = {
    x: 50,
    y: 300,
    width: 24,
    height: 40,
    speed: 5,
    velX: 0,
    velY: 0,
    jumping: false,
    grounded: false,
    direction: "right"
};

const gravity = 0.6;
const friction = 0.8;
const keys = {};

// Виртуальные кнопки для телефона
const mobileKeys = {
    left: false,
    right: false,
    jump: false
};

const platforms = [
    { x: 0, y: 380, width: 800, height: 20 },
    { x: 200, y: 280, width: 120, height: 15 },
    { x: 450, y: 210, width: 150, height: 15 },
    { x: 150, y: 140, width: 100, height: 15 },
    { x: 650, y: 260, width: 100, height: 15 }
];

const coin = {
    x: 520,
    y: 160,
    size: 10
};

// Слушатели для клавиатуры
window.addEventListener("keydown", (e) => { keys[e.code] = true; });
window.addEventListener("keyup", (e) => { keys[e.code] = false; });

// Функция для привязки тач-событий к кнопкам
function setupMobileButton(elementId, keyProp) {
    const btn = document.getElementById(elementId);
    
    btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        mobileKeys[keyProp] = true;
    }, { passive: false });
    
    btn.addEventListener("touchend", (e) => {
        e.preventDefault();
        mobileKeys[keyProp] = false;
    }, { passive: false });
}

// Настраиваем телефонные кнопки
setupMobileButton("btnLeft", "left");
setupMobileButton("btnRight", "right");
setupMobileButton("btnJump", "jump");

function update() {
    // Движение (проверяем и клавиатуру, и экранные кнопки)
    if (keys["ArrowRight"] || keys["KeyD"] || mobileKeys.right) {
        if (player.velX < player.speed) player.velX++;
        player.direction = "right";
    }
    if (keys["ArrowLeft"] || keys["KeyA"] || mobileKeys.left) {
        if (player.velX > -player.speed) player.velX--;
        player.direction = "left";
    }
    
    // Прыжок
    if ((keys["ArrowUp"] || keys["Space"] || keys["KeyW"] || mobileKeys.jump) && !player.jumping && player.grounded) {
        player.jumping = true;
        player.grounded = false;
        player.velY = -12;
    }

    player.velX *= friction;
    player.velY += gravity;
    player.grounded = false;

    for (let plat of platforms) {
        if (player.x < plat.x + plat.width &&
            player.x + player.width > plat.x &&
            player.y < plat.y + plat.height &&
            player.y + player.height > plat.y) {
            
            if (player.velY > 0 && player.y + player.height - player.velY <= plat.y) {
                player.grounded = true;
                player.jumping = false;
                player.velY = 0;
                player.y = plat.y - player.height;
            }
        }
    }

    player.x += player.velX;
    player.y += player.velY;

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

    let distX = (player.x + player.width/2) - coin.x;
    let distY = (player.y + player.height/2) - coin.y;
    let distance = Math.sqrt(distX * distX + distY * distY);

    if (distance < player.width/2 + coin.size) {
        score++;
        scoreDisplay.textContent = score;
        coin.x = Math.random() * (canvas.width - 50) + 25;
        coin.y = Math.random() * 250 + 50;
    }

    if (Math.abs(player.velX) > 0.2 && player.grounded) {
        animationFrame += 0.2;
    } else {
        animationFrame = 0;
    }
}

function drawPlayer(ctx, p) {
    const centerX = p.x + p.width / 2;
    const headRadius = 7;
    const headY = p.y + headRadius;
    const bodyTopY = p.y + headRadius * 2;
    const bodyBottomY = p.y + p.height - 12;
    
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#eccc68";

    ctx.beginPath();
    ctx.arc(centerX, headY, headRadius, 0, Math.PI * 2);
    ctx.fillStyle = "#eccc68";
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#000";
    const eyeX = p.direction === "right" ? centerX + 3 : centerX - 5;
    ctx.fillRect(eyeX, headY - 2, 2, 3);

    ctx.beginPath();
    ctx.moveTo(centerX, bodyTopY);
    ctx.lineTo(centerX, bodyBottomY);
    ctx.stroke();

    const swing = Math.sin(animationFrame) * 10;

    ctx.beginPath();
    if (p.jumping) {
        ctx.moveTo(centerX, bodyTopY + 4);
        ctx.lineTo(centerX - 8, bodyTopY - 6);
        ctx.moveTo(centerX, bodyTopY + 4);
        ctx.lineTo(centerX + 8, bodyTopY - 6);
    } else {
        ctx.moveTo(centerX, bodyTopY + 4);
        ctx.lineTo(centerX + swing, bodyTopY + 12);
        ctx.moveTo(centerX, bodyTopY + 4);
        ctx.lineTo(centerX - swing, bodyTopY + 12);
    }
    ctx.stroke();

    ctx.beginPath();
    if (p.jumping) {
        ctx.moveTo(centerX, bodyBottomY);
        ctx.lineTo(centerX - 5, bodyBottomY + 8);
        ctx.moveTo(centerX, bodyBottomY);
        ctx.lineTo(centerX + 5, bodyBottomY + 8);
    } else {
        ctx.moveTo(centerX, bodyBottomY);
        ctx.lineTo(centerX + swing, p.y + p.height);
        ctx.moveTo(centerX, bodyBottomY);
        ctx.lineTo(centerX - swing, p.y + p.height);
    }
    ctx.stroke();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00adb5";
    for (let plat of platforms) {
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    }

    ctx.fillStyle = "#ffd32a";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#ffd32a";
    ctx.beginPath();
    ctx.arc(coin.x, coin.y, coin.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    drawPlayer(ctx, player);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
